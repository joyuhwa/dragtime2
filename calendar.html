<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Drag Time</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<h9>ver. 26/3/31/15:04</h9>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f7fb;
  padding:30px;
}

#topBar{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:14px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.month-nav-btn{
  border:none;
  background:white;
  width:52px;
  height:52px;
  border-radius:14px;
  font-size:24px;
  cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,0.05);
  transition:.15s ease;
}

.month-nav-btn:hover{
  transform:translateY(-2px);
}

h1{
  margin:0;
  font-size:56px;
  font-weight:800;
}

#calendar{
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  gap:14px;
  max-width:1200px;
}
#weekdays{
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  gap:14px;
  max-width:1200px;
  margin-bottom:14px;
}

.weekday{
  background:transparent;
  text-align:center;
  font-size:18px;
  font-weight:700;
  color:#666;
  padding:8px 0;
}

.weekday.sunday{
  color:#ff6b6b;
}

.weekday.saturday{
  color:#4d7cff;
}

.day{
  background:white;
  border:none;
  border-radius:18px;
  min-height:90px;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,0.05);
  transition:.15s ease;
  position:relative;

  color:#111;
  -webkit-text-fill-color:#111;
  -webkit-appearance:none;
  appearance:none;
  -webkit-tap-highlight-color:transparent;
}

.day:active,
.day:focus{
  color:#111;
  -webkit-text-fill-color:#111;
  outline:none;
}
  
.empty-day{
  background:transparent;
  border:none;
  min-height:90px;
}

@media (max-width: 768px){
  .empty-day{
    min-height:60px;
  }
}

.day:hover{
  transform:translateY(-2px);
}

.day.has-data{
  outline:3px solid #a8c7ff;
  background:#f7fbff;
}

.day small{
  position:absolute;
  left:12px;
  bottom:10px;
  font-size:12px;
  color:#3f8cff;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  padding:20px;
}

#modalWindow{
  width:min(1100px, 95vw);
  height:min(800px, 90vh);
  background:white;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,0.28);
  display:flex;
  flex-direction:column;
}

#modalHeader{
  height:58px;
  background:#f5f6fa;
  border-bottom:1px solid #e5e7eb;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  flex-shrink:0;
}

#modalTitle{
  font-weight:700;
}

#closeBtn{
  border:none;
  background:#111;
  color:white;
  border-radius:10px;
  padding:8px 14px;
  cursor:pointer;
}

#plannerFrame{
  width:100%;
  height:100%;
  border:none;
}

@media (max-width: 768px){
  body{padding:16px;}
  h1{font-size:36px;}
  #calendar{grid-template-columns:repeat(7, 1fr); gap:6px;}
  #weekdays{grid-template-columns:repeat(7, 1fr); gap:6px;}
  .day{min-height:60px; font-size:16px;}
  .weekday{font-size:15px;}
  .month-nav-btn{
    width:44px;
    height:44px;
    font-size:20px;
  }
}
</style>
</head>
<body>
<script src="https://developers.kakao.com/sdk/js/kakao.js"></script>

<script>
Kakao.init('4e97a58d5ccb2323c14010a02b763d3e');

// ✅ 여기!!
if (!Kakao.Auth.getAccessToken()) {
  alert("로그인 먼저 해주세요!");
  window.location.href = "login.html";
}
</script>
  <div id="userInfo"></div>
  <button onclick="kakaoLogin()">카카오 로그인</button>
  
<div id="topBar">
  <button class="month-nav-btn" id="prevMonthBtn">◀</button>
  <h1 id="monthTitle"></h1>
  <button class="month-nav-btn" id="nextMonthBtn">▶</button>
</div>

<div id="weekdays">
  <div class="weekday sunday">일</div>
  <div class="weekday">월</div>
  <div class="weekday">화</div>
  <div class="weekday">수</div>
  <div class="weekday">목</div>
  <div class="weekday">금</div>
  <div class="weekday saturday">토</div>
</div>

<div id="calendar"></div>

<div id="overlay">
  <div id="modalWindow">
    <div id="modalHeader">
      <div id="modalTitle">플래너</div>
      <button id="closeBtn">닫기</button>
    </div>
    <iframe id="plannerFrame"></iframe>
  </div>
</div>

<script>
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;

const monthTitle = document.getElementById("monthTitle");
const calendar = document.getElementById("calendar");
const overlay = document.getElementById("overlay");
const plannerFrame = document.getElementById("plannerFrame");
const modalTitle = document.getElementById("modalTitle");
const closeBtn = document.getElementById("closeBtn");
const prevMonthBtn = document.getElementById("prevMonthBtn");
const nextMonthBtn = document.getElementById("nextMonthBtn");

function pad(n){
  return String(n).padStart(2,"0");
}

function getDateString(day){
  return `${currentYear}-${pad(currentMonth)}-${pad(day)}`;
}

function hasData(dateStr){
  return !!localStorage.getItem("dragtime_data_" + dateStr);
}

function updateMonthTitle(){
  monthTitle.textContent = `${currentYear}년 ${currentMonth}월`;
}

function openPlanner(day){
  const dateStr = getDateString(day);
  modalTitle.textContent = `${currentYear}년 ${currentMonth}월 ${day}일 플래너`;
  plannerFrame.src = `dragtime.html?date=${dateStr}`;
  overlay.style.display = "flex";
}

function closePlanner(){
  overlay.style.display = "none";
  plannerFrame.src = "";
  renderCalendar();
}

closeBtn.onclick = closePlanner;

overlay.addEventListener("click", (e)=>{
  if(e.target === overlay){
    closePlanner();
  }
});

prevMonthBtn.onclick = ()=>{
  currentMonth--;

  if(currentMonth < 1){
    currentMonth = 12;
    currentYear--;
  }

  renderCalendar();
};

nextMonthBtn.onclick = ()=>{
  currentMonth++;

  if(currentMonth > 12){
    currentMonth = 1;
    currentYear++;
  }

  renderCalendar();
};

function renderCalendar(){
  calendar.innerHTML = "";
  updateMonthTitle();

  const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
  const lastDay = new Date(currentYear, currentMonth, 0).getDate();

  for(let i=0; i<firstDay; i++){
    const empty = document.createElement("div");
    empty.className = "empty-day";
    calendar.appendChild(empty);
  }

  for(let day=1; day<=lastDay; day++){
    const btn = document.createElement("button");
    btn.className = "day";
    btn.textContent = day;

    const dateStr = getDateString(day);

    if(hasData(dateStr)){
      btn.classList.add("has-data");

      const mark = document.createElement("small");
      /*mark.textContent = "저장됨";*/
      btn.appendChild(mark);
    }

    btn.onclick = ()=>{
      openPlanner(day);
    };

    calendar.appendChild(btn);
  }
}

renderCalendar();
</script>
  <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>

<script>
  // 1. 카카오 초기화 (여기에 너 키 넣기!)
  Kakao.init('4e97a58d5ccb2323c14010a02b763d3e');
  console.log('Kakao loaded?', typeof Kakao !== 'undefined');
  console.log('Initialized?', Kakao.isInitialized());
  // 2. 로그인 함수
  function kakaoLogin() {
    console.log('login button clicked');
    Kakao.Auth.login({
      
      success: function(response) {
        console.log('login success', response);

        Kakao.API.request({
          url: '/v2/user/me',
          success: function(res) {
            console.log('user info', res);

            let name = res.kakao_account?.profile?.nickname ?? '사용자';
            let img = res.kakao_account?.profile?.profile_image_url ?? '';

            document.getElementById("userInfo").innerHTML = `
              <h3>${name}님 환영합니다!</h3>
              ${img ? `<img src="${img}" width="80" style="border-radius:50%;">` : ''}
            `;
          },
          fail: function(error) {
            console.log('user info fail', error);
            alert('사용자 정보 불러오기 실패');
          }
        });
      },
      fail: function(error) {
        console.log('login fail', error);
        alert('로그인 실패: ' + JSON.stringify(error));
      }
    });
  }
</script>
</body>
</html>
