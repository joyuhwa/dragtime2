
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DragTime</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
*{
  box-sizing:border-box;
  user-select:none;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f6fa;
  margin:0;
  padding:20px;
}

/* 모바일 */



#leftPanel,
#rightPanel{
  display:flex;
  flex-direction:column;
  align-items:stretch;
  flex-shrink:0;
}

#rightPanel{
  width:280px;
}

#plannerHeader{
  background:white;
  border:1px solid #ccc;
  border-radius:8px;
  padding:14px 16px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.03);
  display:flex;
  align-items:center;
}

#plannerTitle{
  width:100%;
  border:none;
  outline:none;
  font-size:18px;
  font-weight:600;
  background:transparent;
}

#grid{
  display:grid;
  grid-template-columns:90px repeat(12,20px);
  border:1px solid #ccc;
  background:white;
  border-radius:10px;
  overflow:hidden;
  touch-action:none;
}

#side{
  width:100%;
  background:white;
  border:1px solid #ccc;
  border-radius:8px;
  padding:10px;
  height:auto;
  overflow:visible;
  margin-bottom:10px;
}

#side h3{text-align:center;}

#dateBar{
  background:#ffd84d;
  border:1px solid #ccc;
  border-radius:8px;
  padding:10px 16px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.03);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#prevDay,
#nextDay{
  border:none;
  background:transparent;
  font-size:16px;
  cursor:pointer;
  font-weight:bold;
}

#datePicker{
  border:none;
  font-size:13px;
  background:transparent;
  text-align:center;
  width:100%;
  font-weight:600;
}

.side-item{
  display:flex;
  align-items:flex-start;
  gap:8px;
  border:1px solid #ddd;
  border-radius:8px;
  padding:6px;
  padding-right:80px;
  margin-bottom:6px;
  font-size:12px;
  position:relative;
  overflow:hidden;
}

.side-item .text-box{
  flex:1;
  min-width:0;
  max-width:100%;
  word-break:break-word;
  overflow-wrap:break-word;
  white-space:normal;
}

.delete-btn{
  position:absolute;
  top:6px;
  border:none;
  color:white;
  border-radius:4px;
  font-size:10px;
  cursor:pointer;
  padding:2px 6px;
}

.color-box{width:16px;height:16px;border-radius:4px;}

.time{
  height:40px;width:90px;background:#f1f3f6;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;
  box-shadow: inset -1px 0 0 #ddd, inset 0 -1px 0 #ddd;
}

.cell{
  height:40px;
  width:20px;
  cursor:pointer;
  box-shadow: inset -1px 0 0 #eee, inset 0 -1px 0 #eee;
}

.cell.v-strong{
  box-shadow: inset -1px 0 0 #cfcfcf, inset 0 -1px 0 #eee;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:8px;
  width:300px;
  max-width:90%;
}

.modal-box input,
.modal-box textarea,
.modal-box select{
  width:100%;
  box-sizing:border-box;
  font-size:16px;
}

#colorInput{
  width:60px;
  height:36px;
  padding:0;
  border:none;
  background:none;
}
#colorPickerWrap{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

#presetColors{
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap:8px;
}

.color-chip{
  width:28px;
  height:28px;
  border-radius:50%;
  border:2px solid transparent;
  cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,0.15);
  transition:.15s ease;
}

.color-chip:hover{
  transform:scale(1.08);
}

.color-chip.active{
  border-color:#111;
  transform:scale(1.08);
}

#colorInput{
  width:28px;
  height:28px;
  padding:0;
  border:none;
  background:none;
  cursor:pointer;
}

#addFromSide{
  width:100%;
  margin-bottom:10px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#3f8cff;
  color:white;
  cursor:pointer;
}

#addTodo{
  width:100%;
  margin-bottom:10px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#00b894;
  color:white;
  cursor:pointer;
}

#captureBtn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
  font-size:13px;
  margin-bottom:8px;
}

#plannerViewport{
  width:100%;
  overflow:hidden;
}

#captureArea{
  display:flex;
  gap:20px;
  align-items:flex-start;
  transform-origin: top left;
}

#resetBtn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff5c5c;
  color:white;
  cursor:pointer;
  font-size:13px;
}

.drag-preview{
  background: rgba(63,140,255,0.3);
}
</style>
</head>

<body>
<div id="plannerViewport">
  <div id="captureArea">
    <div id="leftPanel">
      <div id="plannerHeader">
        <input id="plannerTitle">
      </div>
      <div id="grid"></div>
    </div>

    <div id="rightPanel">
      <div id="side">
        <h3>📌 일정 목록</h3>
        <button id="addFromSide">📋 일정 추가</button>
        <div id="list"></div>

        <h3 style="margin-top:12px;">📌 투두 목록</h3>
        <button id="addTodo">✅ 투두 추가</button>
        <div id="todoList"></div>
      </div>


      <button id="captureBtn">📸 화면 저장</button>
      <button id="resetBtn">🗑 화면 초기화</button>
    </div>
  </div>
</div>


<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle">일정 입력</h3>
    <input id="titleInput" placeholder="제목"><br><br>
    <textarea id="detailInput" placeholder="세부내용"></textarea><br><br>

    <div id="timeFields">
      <label>시작</label><select id="editStart"></select><br><br>
      <label>종료</label><select id="editEnd"></select><br><br>
    </div>

    <div id="colorPickerWrap">
      <div id="presetColors"></div>
      <input type="color" id="colorInput">
    </div><br>
    <button id="save">저장</button>
    <button id="cancel">취소</button>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
let currentDate = params.get("date") || new Date().toISOString().slice(0,10);

function getStorageKey(){
  return "dragtime_data_" + currentDate;
}

function resetAll(){
  if(confirm("⚠ 해당 날짜 플래너 데이터가 삭제됩니다.\n초기화할까요?")){
    localStorage.removeItem(getStorageKey());
    location.reload();
  }
}

const presetColorList = [
  "#ff58c4",
  "#ff5b59",
  "#ff9b56",
  "#ffb954",
  "#ffdd50",
  "#ffff4c",
  "#cdff4e",
  "#63ff51",
  "#55e1ff",
  "#58b1ff",
  "#5b68ff",
  "#bf55ff"
];

function getRandomColor(){
  return presetColorList[Math.floor(Math.random()*presetColorList.length)];
}


const plannerTitleInput = document.getElementById("plannerTitle");

const baseDate = new Date(currentDate);
const yy = String(baseDate.getFullYear()).slice(2);
const mm = String(baseDate.getMonth()+1).padStart(2,"0");
const dd = String(baseDate.getDate()).padStart(2,"0");
plannerTitleInput.value = `📆 Drag Time ${yy}${mm}${dd}`;
plannerTitleInput.addEventListener("input", saveAll);

const grid=document.getElementById("grid");
const listBox=document.getElementById("list");
const todoBox=document.getElementById("todoList");

const modal=document.getElementById("modal");
const modalTitle=document.getElementById("modalTitle");
const saveBtn=document.getElementById("save");
const cancelBtn=document.getElementById("cancel");
const resetBtn=document.getElementById("resetBtn");
const captureBtn=document.getElementById("captureBtn");

const timeFields=document.getElementById("timeFields");

resetBtn.onclick = resetAll;

const titleInput=document.getElementById("titleInput");
const detailInput=document.getElementById("detailInput");

const colorInput=document.getElementById("colorInput");
const presetColors=document.getElementById("presetColors");
const editStart=document.getElementById("editStart");
const editEnd=document.getElementById("editEnd");

const addFromSideBtn=document.getElementById("addFromSide");
const addTodoBtn=document.getElementById("addTodo");

let editingItem=null;
let isEditMode=false;
let backupData=null;

let isTodoMode=false;
let editingTodo=null;

let isDragging = false;
let dragStartIndex = null;
let dragEndIndex = null;

function setTimeFieldsVisible(visible){
  timeFields.style.display = visible ? "block" : "none";
}
function setSelectedColor(color){
  colorInput.value = color;

  document.querySelectorAll(".color-chip").forEach(chip=>{
    if(chip.dataset.color === color){
      chip.classList.add("active");
    }else{
      chip.classList.remove("active");
    }
  });
}

function renderPresetColors(){
  presetColors.innerHTML = "";

  presetColorList.forEach(color=>{
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "color-chip";
    chip.style.background = color;
    chip.dataset.color = color;

    chip.onclick = ()=>{
      setSelectedColor(color);
    };

    presetColors.appendChild(chip);
  });
}

colorInput.addEventListener("input", ()=>{
  setSelectedColor(colorInput.value);
});
const times=[];
for(let i=7;i<27;i++){
  let h=i%24;
  for(let j=0;j<12;j++){
    times.push(String(h).padStart(2,"0")+":"+String(j*5).padStart(2,"0"));
  }
}

[times].forEach(arr=>{
  arr.forEach(t=>{
    [editStart,editEnd].forEach(sel=>{
      const o=document.createElement("option");
      o.value=t;
      o.innerText=t;
      sel.appendChild(o.cloneNode(true));
    });
  });
});

function clearDragPreview(){
  document.querySelectorAll(".cell.drag-preview").forEach(c=>c.classList.remove("drag-preview"));
}

function fitPlannerToScreen(){
  const viewport = document.getElementById("plannerViewport");
  const captureArea = document.getElementById("captureArea");

  if(!viewport || !captureArea) return;

  captureArea.style.transform = "scale(1)";

  const availableWidth = viewport.clientWidth;
  const contentWidth = captureArea.scrollWidth;

  if(contentWidth === 0) return;

  const scale = Math.min(1, availableWidth / contentWidth);

  captureArea.style.transform = `scale(${scale})`;
  viewport.style.height = `${captureArea.offsetHeight * scale}px`;
}

window.addEventListener("resize", fitPlannerToScreen);
fitPlannerToScreen();

function paintDragPreview(s,e){
  clearDragPreview();
  for(let i=s;i<=e;i++){
    const c=document.querySelector(`.cell[data-index='${i}']`);
    if(c) c.classList.add("drag-preview");
  }
}

let cellIndex=0;
for(let r=0;r<20;r++){
  const timeCell=document.createElement("div");
  timeCell.className="time";
  timeCell.innerText=times[r*12];
  grid.appendChild(timeCell);

  for(let c=0;c<12;c++){
    const cell=document.createElement("div");
    cell.className="cell";
    cell.dataset.index=cellIndex;

    if((cellIndex+1)%2===0 && (cellIndex+1)%12!==0){
      cell.classList.add("v-strong");
    }

    cell.addEventListener("pointerdown", ()=>{
      isDragging = true;
      dragStartIndex = Number(cell.dataset.index);
      dragEndIndex = dragStartIndex;
      paintDragPreview(dragStartIndex, dragEndIndex);
    });

    grid.appendChild(cell);
    cellIndex++;
  }
}

document.addEventListener("pointermove", e=>{
  if(!isDragging) return;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if(!el || !el.classList.contains("cell")) return;
  const idx = Number(el.dataset.index);
  dragEndIndex = idx;
  let s = Math.min(dragStartIndex, dragEndIndex);
  let e2 = Math.max(dragStartIndex, dragEndIndex);
  paintDragPreview(s, e2);
});

document.addEventListener("pointerup", ()=>{
  if(!isDragging) return;
  isDragging = false;
  clearDragPreview();

  let s = Math.min(dragStartIndex, dragEndIndex);
  let e = Math.max(dragStartIndex, dragEndIndex) + 1;

  if(hasOverlap(s, e)){
    alert("⚠ 이미 등록된 일정과 시간이 겹칩니다!");
    return;
  }
  modalTitle.innerText="일정 추가";
  isEditMode=false;
  isTodoMode=false;
  editingItem=null;
  editingTodo=null;

  setTimeFieldsVisible(true);

  titleInput.value="";
  detailInput.value="";
  setSelectedColor(getRandomColor());

  editStart.value=times[s];
  editEnd.value=times[e] || times[times.length-1];

  modal.style.display="flex";
});

function clearCells(s,e){
  for(let i=s;i<e;i++){
    const c=document.querySelector(`.cell[data-index='${i}']`);
    if(c) c.style.background="";
  }
}

function paintCells(s,e,color){
  for(let i=s;i<e;i++){
    const c=document.querySelector(`.cell[data-index='${i}']`);
    if(c) c.style.background=color;
  }
}

function sortSideList(){
  const items = Array.from(listBox.querySelectorAll(".side-item"));
  items.sort((a,b)=> Number(a.dataset.start) - Number(b.dataset.start));
  items.forEach(item => listBox.appendChild(item));
}

function saveAll(){
  const items = [];
  document.querySelectorAll("#list .side-item").forEach(item=>{
    items.push({
      title:item.dataset.title,
      detail:item.dataset.detail,
      color:item.dataset.color,
      s:Number(item.dataset.start),
      e:Number(item.dataset.end)
    });
  });

  const todos = [];
  document.querySelectorAll("#todoList .side-item").forEach(item=>{
    todos.push({
      title:item.dataset.title,
      detail:item.dataset.detail,
      color:item.dataset.color
    });
  });

  const data = {
    title: plannerTitleInput.value,
    items,
    todos
  };

  localStorage.setItem(getStorageKey(), JSON.stringify(data));
}

function loadAll(){
  const raw = localStorage.getItem(getStorageKey());
  if(!raw) return;
  const data = JSON.parse(raw);

  if(data.title){
    plannerTitleInput.value = data.title;
  }

  if(Array.isArray(data.items)){
    data.items.forEach(it=>{
      paintCells(it.s,it.e,it.color);
      createSideItem(it.title,it.detail,it.color,it.s,it.e,false);
    });
  }

  if(Array.isArray(data.todos)){
    data.todos.forEach(td=>{
      createTodoItem(td.title, td.detail, td.color || getRandomColor(), false);
    });
  }
}

function createSideItem(title,detail,color,sIdx,eIdx,save=true){
  const item=document.createElement("div");
  item.className="side-item";
  item.dataset.start=sIdx;
  item.dataset.end=eIdx;
  item.dataset.title=title;
  item.dataset.detail=detail;
  item.dataset.color=color;

  const colorBox=document.createElement("div");
  colorBox.className="color-box";
  colorBox.style.background=color;

  const text=document.createElement("div");
  text.className="text-box";
  text.innerHTML=`<b>${title}</b><br><small>${detail}</small><br><small>⏰ ${times[sIdx]} ~ ${times[eIdx]}</small>`;

  const editBtn=document.createElement("button");
  editBtn.className="delete-btn";
  editBtn.style.right="42px";
  editBtn.style.background="#4caf50";
  editBtn.innerText="수정";

  editBtn.onclick=()=>{
    isEditMode=true;
    isTodoMode=false;
    editingItem=item;
    editingTodo=null;

    setTimeFieldsVisible(true);

    backupData = {
      s: Number(item.dataset.start),
      e: Number(item.dataset.end),
      color: item.dataset.color
    };

    modalTitle.innerText="일정 수정";

    titleInput.value=item.dataset.title;
    detailInput.value=item.dataset.detail;
    setSelectedColor(item.dataset.color);
    editStart.value=times[item.dataset.start];
    editEnd.value=times[item.dataset.end];

    clearCells(item.dataset.start,item.dataset.end);
    modal.style.display="flex";
  };

  const del=document.createElement("button");
  del.className="delete-btn";
  del.style.right="6px";
  del.style.background="#ff5c5c";
  del.innerText="삭제";

  del.onclick=()=>{
    clearCells(Number(item.dataset.start), Number(item.dataset.end));
    item.remove();
    saveAll();
  };

  item.append(colorBox,text,editBtn,del);
  listBox.appendChild(item);
  sortSideList();
  if(save) saveAll();
}

function hasOverlap(startIdx, endIdx, excludeItem = null){
  const items = document.querySelectorAll("#list .side-item");

  for(const item of items){
    if(item === excludeItem) continue;

    const itemStart = Number(item.dataset.start);
    const itemEnd = Number(item.dataset.end);

    if(startIdx < itemEnd && endIdx > itemStart){
      return true;
    }
  }

  return false;
}

function createTodoItem(title, detail, color, save=true){
  const item=document.createElement("div");
  item.className="side-item";
  item.dataset.title=title;
  item.dataset.detail=detail;
  item.dataset.color=color;

  const colorBox=document.createElement("div");
  colorBox.className="color-box";
  colorBox.style.background=color;

  const text=document.createElement("div");
  text.className="text-box";
  text.innerHTML=`<b>${title}</b><br><small>${detail}</small>`;

  const editBtn=document.createElement("button");
  editBtn.className="delete-btn";
  editBtn.style.right="42px";
  editBtn.style.background="#4caf50";
  editBtn.innerText="수정";

  editBtn.onclick=()=>{
    isTodoMode=true;
    isEditMode=false;
    editingTodo=item;
    editingItem=null;

    modalTitle.innerText="투두 수정";

    titleInput.value=item.dataset.title;
    detailInput.value=item.dataset.detail;
    setSelectedColor(item.dataset.color);

    setTimeFieldsVisible(false);

    modal.style.display="flex";
  };

  const del=document.createElement("button");
  del.className="delete-btn";
  del.style.right="6px";
  del.style.background="#ff5c5c";
  del.innerText="삭제";

  del.onclick=()=>{
    item.remove();
    saveAll();
  };

  item.append(colorBox,text,editBtn,del);
  todoBox.appendChild(item);

  if(save) saveAll();
}

saveBtn.onclick=()=>{
  const title=titleInput.value.trim();
  const detail=detailInput.value.trim();
  const color=colorInput.value;
/*
  if(title === ""){
    alert("⚠ 제목을 입력해주세요!");
    return;
  }
*/
  if(isTodoMode){
    if(editingTodo){
      editingTodo.remove();
    }

    createTodoItem(title, detail, color, true);

    modal.style.display="none";
    isTodoMode=false;
    editingTodo=null;
    isEditMode=false;
    editingItem=null;
    backupData=null;
    return;
  }

  const sIdx=times.indexOf(editStart.value);
  const eIdx=times.indexOf(editEnd.value);

  if(eIdx <= sIdx){
    alert("⚠ 종료 시간은 시작 시간보다 늦어야 합니다!");
    return;
  }
  if(hasOverlap(sIdx, eIdx, isEditMode ? editingItem : null)){
    alert("⚠ 이미 등록된 일정과 시간이 겹칩니다!");
    return;
  }
  if(isEditMode && editingItem){
    editingItem.remove();
  }

  paintCells(sIdx,eIdx,color);
  createSideItem(title,detail,color,sIdx,eIdx,true);

  modal.style.display="none";
  isEditMode=false;
  editingItem=null;
  backupData=null;
};

cancelBtn.onclick=()=>{
  if(!isTodoMode && isEditMode && backupData){
    paintCells(backupData.s, backupData.e, backupData.color);
  }

  modal.style.display="none";
  isEditMode=false;
  editingItem=null;
  backupData=null;
  isTodoMode=false;
  editingTodo=null;
  setTimeFieldsVisible(true);
};

addFromSideBtn.onclick=()=>{
  isEditMode=false;
  isTodoMode=false;
  editingItem=null;
  editingTodo=null;

  setTimeFieldsVisible(true);

  modalTitle.innerText="일정 추가";
  titleInput.value="";
  detailInput.value="";
  setSelectedColor(getRandomColor());
  editStart.value=times[0];
  editEnd.value=times[1];
  modal.style.display="flex";
};

addTodoBtn.onclick=()=>{
  isTodoMode=true;
  isEditMode=false;
  editingItem=null;
  backupData=null;
  editingTodo=null;

  modalTitle.innerText="할 일 추가";
  titleInput.value="";
  detailInput.value="";
  setSelectedColor(getRandomColor());

  setTimeFieldsVisible(false);
  modal.style.display="flex";
};

captureBtn.onclick = ()=>{
  const target = document.getElementById("captureArea");

  const btns = document.querySelectorAll(".delete-btn");
  btns.forEach(b=>b.style.display="none");

  const addBtn = document.getElementById("addFromSide");
  addBtn.style.display = "none";

  const todoAddBtn = document.getElementById("addTodo");
  todoAddBtn.style.display = "none";

  const dateBar = document.getElementById("dateBar");
  if(dateBar) dateBar.style.display = "none";

  captureBtn.style.display = "none";
  resetBtn.style.display = "none";

  const wrapper = document.createElement("div");
  wrapper.style.padding = "40px";
  wrapper.style.background = "#f4f6fa";
  wrapper.style.display = "inline-block";

  const parent = target.parentNode;
  const nextSibling = target.nextSibling;

  parent.removeChild(target);
  wrapper.appendChild(target);
  parent.insertBefore(wrapper, nextSibling);

  html2canvas(wrapper, { scale: 2 }).then(canvas=>{
    const link = document.createElement("a");
    link.download = "time_planner.jpeg";
    link.href = canvas.toDataURL("image/jpeg", 0.95);
    link.click();

    parent.removeChild(wrapper);
    parent.insertBefore(target, nextSibling);

    btns.forEach(b=>b.style.display="block");
    addBtn.style.display = "block";
    todoAddBtn.style.display = "block";
    captureBtn.style.display = "block";
    resetBtn.style.display = "block";
    dateBar.style.display = "flex";
  });
};





renderPresetColors();
setSelectedColor(getRandomColor());
loadAll();
fitPlannerToScreen();

window.addEventListener("resize", fitPlannerToScreen);
</script>
</body>
